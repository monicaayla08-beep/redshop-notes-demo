  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--pink:#FF2442;--bg:#F5F5F7;--card:#fff;--text:#1D1D1F;--sub:#86868B;--r:12px}
    html,body{height:100%;overflow:hidden}
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
      background:var(--bg);max-width:480px;margin:0 auto;display:flex;flex-direction:column;
      height:100%;-webkit-font-smoothing:antialiased}
    .hd{background:#fff;padding:14px 16px 0;z-index:10;box-shadow:0 1px 0 rgba(0,0,0,.06)}
    .hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .logo{display:flex;align-items:center;gap:8px}
    .logo-ic{width:28px;height:28px;background:var(--pink);border-radius:8px;display:flex;align-items:center;justify-content:center}
    .logo-ic svg{width:18px;height:18px;fill:#fff}
    .logo-nm{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.3px}
    .tabs{display:flex;overflow-x:auto;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{flex-shrink:0;padding:10px 16px 12px;font-size:15px;font-weight:500;color:var(--sub);
      border:none;background:transparent;cursor:pointer;position:relative;transition:color .2s;white-space:nowrap}
    .tab.on{color:var(--text);font-weight:700}
    .tab.on::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
      width:20px;height:3px;background:var(--pink);border-radius:3px 3px 0 0}
    .ct{flex:1;overflow:hidden;position:relative}
    .pane{position:absolute;inset:0;overflow-y:auto;display:none;
      -webkit-overflow-scrolling:touch;overscroll-behavior:contain}
    .pane.on{display:block}
    .pane::-webkit-scrollbar{display:none}
    .grid{column-count:2;column-gap:8px;padding:8px}
    .card{break-inside:avoid;display:inline-block;width:100%;margin-bottom:8px;
      background:var(--card);border-radius:var(--r);overflow:hidden;
      box-shadow:0 1px 4px rgba(0,0,0,.08);cursor:pointer;text-decoration:none;color:inherit;
      transition:transform .15s}
    .card:active{transform:scale(.97)}
    .cover{width:100%;position:relative;overflow:hidden;background:#EBEBED}
    .cover img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .3s}
    .cover img.hide{opacity:0}
    .cover img.show{opacity:1}
    .shimmer{background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);
      background-size:200% 100%;animation:sh 1.5s infinite linear}
    @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .cbody{padding:8px 10px 10px}
    .ctitle{font-size:13px;line-height:1.5;color:var(--text);
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
      overflow:hidden;margin-bottom:8px;min-height:39px}
    .cfoot{display:flex;align-items:center;gap:6px}
    .ava{width:18px;height:18px;border-radius:50%;flex-shrink:0;overflow:hidden}
    .author{font-size:11px;color:var(--sub);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .likes{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--sub);flex-shrink:0}
    .likes svg{width:13px;height:13px;fill:var(--sub)}
  </style>
</head>

const BG=['#f5e6f2','#ede6f5','#e6ecf5','#f5ebe6','#e6f5eb','#f0f5e6','#f5f5e6','#e6f5f5','#f5e6eb','#e6eff5'];
function buildCard(note, i) {
  const ratio = '3/4';
  const bg = BG[i % BG.length];
  const hasImg = !!note.img;
  const a = document.createElement('a');
  a.className = 'card';
  a.href = note.url || `https://www.xiaohongshu.com/explore/${note.id}`;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  const avatarColor = `hsl(${(i*53)%360},55%,78%)`;
  a.innerHTML = `
    <div class="cover ${hasImg?'shimmer':''}" style="aspect-ratio:${ratio};background:${bg}">
      ${hasImg ? `<img class="hide" alt="" loading="lazy">` : ''}
    </div>
    <div class="cbody">
      <div class="ctitle">${note.title || ''}</div>
      <div class="cfoot">
        <div class="ava"><div style="width:100%;height:100%;border-radius:50%;background:${avatarColor}"></div></div>
        <span class="author">${note.author || ''}</span>
        <div class="likes">
          <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
          ${note.likes ? note.likes.toLocaleString() : ''}
        </div>
      </div>
    </div>`;
  if (hasImg) {
    const coverDiv = a.querySelector('.cover');
    const img = a.querySelector('img');
    const obs = new IntersectionObserver(entries => {
      if (!entries[0].isIntersecting) return;
      obs.disconnect();
      img.src = note.img;
      img.onload = () => { img.classList.replace('hide','show'); coverDiv.classList.remove('shimmer'); };
      img.onerror = () => { coverDiv.classList.remove('shimmer'); };
    }, {rootMargin:'300px'});
    obs.observe(a);
  }
  return a;
}
function buildGrid(notes) {
  const g = document.createElement('div');
  g.className = 'grid';
  notes.forEach((n,i) => g.appendChild(buildCard(n,i)));
  return g;
}
[['p0',ANIME],['p1',DIY],['p2',OTHER]].forEach(([id,notes])=>{
  document.getElementById(id).appendChild(buildGrid(notes));
});
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  tab.classList.add('on');
  document.getElementById('p'+tab.dataset.i).classList.add('on');
});
</script>
